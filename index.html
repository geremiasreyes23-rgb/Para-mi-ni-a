<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para la mujer más especial ❤️</title>

<style>

body{
margin:0;
padding:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#b30000,#ff4d4d);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:#b30000;
}

.container{
background:white;
padding:40px;
border-radius:20px;
width:85%;
max-width:650px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
text-align:center;
z-index:2;
}

h1{
margin-top:0;
}

#message{
font-size:18px;
line-height:1.6;
min-height:160px;
}

.heart{
position:fixed;
color:#ff4d6d;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(0.5);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-10vh) scale(1.2);
opacity:0;
}
}

button{
background:#b30000;
color:white;
border:none;
padding:12px 25px;
border-radius:25px;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#ff4d4d;
}

.footer{
margin-top:25px;
font-size:14px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<h1>Feliz Día de la Mujer ❤️</h1>

<div id="message"></div>

<button onclick="playMusic()">Toca aquí 💖</button>

<div class="footer">
Hecho con amor, solo para ti.
</div>

</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mpeg">
</audio>

<script>

const text = `Hoy quiero decirte algo que tal vez no digo lo suficiente.

Gracias por existir.
Gracias por estar en mi vida.

Eres una mujer increíble. 
Admiro tu bondad, tu forma de cuidar a quienes amas,
tu inteligencia, tu fortaleza y la manera tan especial
que tienes de iluminar todo a tu alrededor.

Desde que llegaste a mi vida, muchas cosas cambiaron,
porque contigo aprendí que el amor también puede ser
tranquilo, bonito y sincero.

Hoy, en el Día de la Mujer, quiero recordarte lo especial
que eres y lo agradecido que estoy de tenerte.

Y si pudiera elegir mil veces… 
mil veces volvería a elegirte a ti. ❤️`;

let i = 0;

function typeWriter(){
if(i < text.length){
document.getElementById("message").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,35);
}
}

typeWriter();

function createHeart(){
const heart = document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+10)+"px";
heart.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}

setInterval(createHeart,400);

function playMusic(){
document.getElementById("music").play();
}

</script>

</body>
</html>
